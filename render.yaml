services:
  - type: cron
    name: weekly-generate
    schedule: "0 6 * * SUN"
    env: node
    buildCommand: npm install
    startCommand: npm run week:generate
  - type: cron
    name: weekly-grade
    schedule: "0 18 * * FRI"
    env: node
    buildCommand: npm install
    startCommand: npm run week:grade
